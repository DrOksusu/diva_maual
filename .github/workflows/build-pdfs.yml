name: Build & Deploy PDFs

# 트리거:
#   - main 푸시 (소스 변경 시)
#   - 매일 새벽 5:07 KST = 20:07 UTC 전날 (Notion 변경 자동 반영)
#   - 수동 (workflow_dispatch)

on:
  push:
    branches: [main]
  schedule:
    - cron: '7 20 * * *'   # 매일 KST 05:07
  workflow_dispatch:
    inputs:
      slides_ratio:
        description: '슬라이드 빌드 샘플 비율 (1.0 = 전체)'
        required: false
        default: '1.0'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      NOTION_SUMMARY_PAGE_ID: ${{ secrets.NOTION_SUMMARY_PAGE_ID }}
      NOTION_SLIDES_DB_ID: ${{ secrets.NOTION_SLIDES_DB_ID }}
      SLIDES_SAMPLE_RATIO: ${{ github.event.inputs.slides_ratio || '1.0' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install LibreOffice + 한글 폰트
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libreoffice \
            fonts-noto-cjk \
            fonts-noto-cjk-extra \
            fonts-nanum \
            fonts-nanum-coding \
            fonts-nanum-extra
          fc-cache -f

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Fetch Notion summary → template.md
        run: |
          node scripts/fetch-notion-md.mjs template.md
          echo "--- template.md 첫 30줄 ---"
          head -30 template.md
          echo "--- 끝 ---"

      - name: Convert PPTX → PDF (LibreOffice)
        run: |
          mkdir -p public
          soffice --headless --convert-to pdf --outdir public template.pptx
          mv public/template.pdf public/template-pptx.pdf

      - name: Convert MD → PDF (Chromium)
        env:
          CHROME_PATH: /usr/bin/google-chrome
        run: |
          which google-chrome || (sudo apt-get install -y wget && \
            wget -q https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb && \
            sudo apt-get install -y ./google-chrome-stable_current_amd64.deb)
          node scripts/md-to-pdf.mjs template.md public/template-md.pdf

      - name: Build slides PDF (Notion DB → 이미지 → 슬라이드)
        env:
          CHROME_PATH: /usr/bin/google-chrome
        run: |
          node scripts/build-slides.mjs public/template-slides.pdf

      - name: Generate index.html
        run: |
          TS=$(date -u +"%Y-%m-%d %H:%M UTC")
          SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
          MD_SIZE=$(du -h public/template-md.pdf | cut -f1)
          PPT_SIZE=$(du -h public/template-pptx.pdf | cut -f1)
          SLD_SIZE=$(du -h public/template-slides.pdf | cut -f1)
          cat > public/index.html <<HTML
          <!doctype html>
          <html lang="ko">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>강의 자료</title>
            <style>
              body { font-family: -apple-system, 'Malgun Gothic', 'Noto Sans KR', sans-serif; max-width: 720px; margin: 60px auto; padding: 0 20px; color: #1a202c; line-height: 1.6; }
              h1 { font-size: 1.6rem; border-bottom: 3px solid #2b6cb0; padding-bottom: 8px; margin-bottom: 24px; }
              ul { list-style: none; padding: 0; }
              li { background: #f7fafc; padding: 14px 18px; margin: 10px 0; border-radius: 6px; border-left: 4px solid #2b6cb0; }
              a { color: #2b6cb0; text-decoration: none; font-weight: 600; font-size: 1.05rem; }
              a:hover { text-decoration: underline; }
              .meta { color: #718096; font-size: 0.85rem; margin-top: 6px; }
              .footer { margin-top: 32px; color: #a0aec0; font-size: 0.8rem; }
              .footer code { background: #edf2f7; padding: 2px 6px; border-radius: 3px; font-size: 0.85em; }
            </style>
          </head>
          <body>
            <h1>강의 자료</h1>
            <ul>
              <li>
                <a href="template-md.pdf">📘 통합 요약본 (PDF, ${MD_SIZE})</a>
                <div class="meta">Notion 요약본 페이지 → 자동 추출</div>
              </li>
              <li>
                <a href="template-slides.pdf">🎬 강의 슬라이드 (PDF, ${SLD_SIZE})</a>
                <div class="meta">Notion DB 페이지별 이미지 → 슬라이드 자동 생성</div>
              </li>
              <li>
                <a href="template-pptx.pdf">📊 강의 슬라이드 (수기 PPT, ${PPT_SIZE})</a>
                <div class="meta">PowerPoint → PDF 변환</div>
              </li>
            </ul>
            <p class="footer">최종 갱신: ${TS} (commit <code>${SHA}</code>) · 매일 새벽 5:07 KST 자동 빌드</p>
          </body>
          </html>
          HTML

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
