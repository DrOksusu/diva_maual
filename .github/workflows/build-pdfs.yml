name: Build & Deploy PDFs

# 트리거:
#   - main 푸시 (소스 변경 시)
#   - 매일 새벽 5:07 KST = 20:07 UTC 전날 (Notion 변경 자동 반영)
#   - 수동 (workflow_dispatch)

on:
  push:
    branches: [main]
  schedule:
    - cron: '7 20 * * *'   # 매일 KST 05:07
  workflow_dispatch:
    inputs:
      slides_ratio:
        description: '슬라이드 빌드 샘플 비율 (1.0 = 전체)'
        required: false
        default: '1.0'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      NOTION_SUMMARY_PAGE_ID: ${{ secrets.NOTION_SUMMARY_PAGE_ID }}
      NOTION_SLIDES_DB_ID: ${{ secrets.NOTION_SLIDES_DB_ID }}
      SLIDES_SAMPLE_RATIO: ${{ github.event.inputs.slides_ratio || '1.0' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install LibreOffice + 한글 폰트
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libreoffice \
            fonts-noto-cjk \
            fonts-noto-cjk-extra \
            fonts-nanum \
            fonts-nanum-coding \
            fonts-nanum-extra
          fc-cache -f

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Fetch Notion summary → template.md
        run: |
          node scripts/fetch-notion-md.mjs template.md
          echo "--- template.md 첫 30줄 ---"
          head -30 template.md
          echo "--- 끝 ---"

      - name: Convert PPTX → PDF (LibreOffice)
        run: |
          mkdir -p public
          soffice --headless --convert-to pdf --outdir public template.pptx
          mv public/template.pdf public/template-pptx.pdf

      - name: Convert MD → PDF (Chromium)
        env:
          CHROME_PATH: /usr/bin/google-chrome
        run: |
          which google-chrome || (sudo apt-get install -y wget && \
            wget -q https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb && \
            sudo apt-get install -y ./google-chrome-stable_current_amd64.deb)
          node scripts/md-to-pdf.mjs template.md public/template-md.pdf

      - name: Build slides PDF (Notion DB → 이미지 → 슬라이드)
        env:
          CHROME_PATH: /usr/bin/google-chrome
        run: |
          node scripts/build-slides.mjs public/template-slides.pdf

      - name: Generate index.html
        run: |
          TS=$(date -u +"%Y-%m-%d %H:%M UTC")
          SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
          MD_SIZE=$(du -h public/template-md.pdf | cut -f1)
          SLD_SIZE=$(du -h public/template-slides.pdf | cut -f1)
          cat > public/index.html <<HTML
          <!doctype html>
          <html lang="ko">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>강의 자료</title>
            <style>
              * { box-sizing: border-box; }
              body { font-family: -apple-system, 'Malgun Gothic', 'Noto Sans KR', sans-serif; margin: 0; padding: 24px; max-width: 1400px; margin: 0 auto; color: #1a202c; }
              header h1 { font-size: 1.5rem; border-bottom: 3px solid #2b6cb0; padding-bottom: 8px; margin: 0 0 8px; }
              header .footer { color: #a0aec0; font-size: 0.8rem; margin: 0 0 20px; }
              header .footer code { background: #edf2f7; padding: 2px 6px; border-radius: 3px; font-size: 0.85em; }
              .pdf-section { margin-bottom: 28px; }
              .pdf-section header { display: flex; align-items: baseline; justify-content: space-between; padding: 8px 12px; background: #2b6cb0; color: white; border-radius: 6px 6px 0 0; }
              .pdf-section h2 { margin: 0; font-size: 1.05rem; font-weight: 600; }
              .pdf-section .actions a { color: white; text-decoration: none; font-size: 0.85rem; opacity: 0.9; margin-left: 12px; }
              .pdf-section .actions a:hover { opacity: 1; text-decoration: underline; }
              iframe.pdf-frame { width: 100%; border: 1px solid #cbd5e0; border-top: none; border-radius: 0 0 6px 6px; display: block; }
              iframe.summary { height: 80vh; }
              iframe.slides { height: 90vh; }
              @media (max-width: 720px) {
                body { padding: 12px; }
                iframe.summary { height: 70vh; }
                iframe.slides { height: 75vh; }
              }
            </style>
          </head>
          <body>
            <header>
              <h1>강의 자료</h1>
              <p class="footer">최종 갱신: ${TS} (commit <code>${SHA}</code>) · 매일 새벽 5:07 KST 자동 빌드</p>
            </header>

            <section class="pdf-section">
              <header>
                <h2>📘 통합 요약본</h2>
                <div class="actions">
                  <a href="template-md.pdf" target="_blank">새 탭 열기</a>
                  <a href="template-md.pdf" download>다운로드 (${MD_SIZE})</a>
                </div>
              </header>
              <iframe class="pdf-frame summary" src="template-md.pdf#view=FitH" title="통합 요약본"></iframe>
            </section>

            <section class="pdf-section">
              <header>
                <h2>🎬 강의 슬라이드</h2>
                <div class="actions">
                  <a href="template-slides.pdf" target="_blank">새 탭 열기</a>
                  <a href="template-slides.pdf" download>다운로드 (${SLD_SIZE})</a>
                </div>
              </header>
              <iframe class="pdf-frame slides" src="template-slides.pdf#view=FitH" title="강의 슬라이드"></iframe>
            </section>
          </body>
          </html>
          HTML

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
